<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Para Mi Eterno Amor</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Capa de texto sobre el túnel */
        #ui {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.55);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        h1 {
            font-size: 3rem;
            color: #ff3366;
            margin: 0 0 15px 0;
            text-shadow: 0 0 10px #ff3366, 0 0 20px #ff3366;
            animation: glow 1.5s ease-in-out infinite alternate;
        }

        p {
            font-size: 1.5rem;
            line-height: 1.5;
            color: #ffcccc;
            margin: 10px 0;
        }

        .firma {
            margin-top: 30px;
            font-size: 1.1rem;
            color: rgba(255, 204, 204, 0.7);
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #ff3366, 0 0 20px #ff3366; }
            to { text-shadow: 0 0 20px #ff3366, 0 0 30px #ff3366, 0 0 40px #ff3366; }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            p { font-size: 1.2rem; }
            #ui { padding: 25px; max-width: 80%; }
        }
    </style>
</head>
<body>

    <canvas id="tunnel"></canvas>

    <div id="ui">
        <h1>[Nombre de tu Novia]</h1>
        
        <p>Mi amor por ti es un viaje infinito,<br>
           cada latido me lleva más cerca de ti.</p>
        <p>Te amo con toda mi alma.</p>
        
        <div class="firma">Con todo mi amor, [Tu Nombre]</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, tube;
        let t = 0; 
        
        // --- CONTROL DE VELOCIDAD FIJO ---
        // Ajusta este número si quieres que el viaje vaya más lento (ej. 0.0005) o más rápido
        const velocidadViaje = 0.0008; 

        const numPoints = 60;
        const curveRadius = 12;
        const tubeRadius = 2.0;
        const tubeSegments = 150;
        const radialSegments = 10;

        function init() {
            scene = new THREE.Scene();
            
            // Reemplazamos la cámara genérica por una de perspectiva correcta para el efecto 3D
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('tunnel'), antialias: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Limita los pixeles en pantallas ultra 4K para mejorar rendimiento
            renderer.setSize(window.innerWidth, window.innerHeight);

            const points = [];
            for (let i = 0; i <= numPoints; i++) {
                points.push(new THREE.Vector3(
                    i * curveRadius * 1.5, 
                    Math.sin(i / 4) * curveRadius, 
                    Math.cos(i / 4) * curveRadius
                ));
            }
            const curve = new THREE.CatmullRomCurve3(points);
            curve.closed = true;

            const geometry = new THREE.TubeGeometry(curve, tubeSegments, tubeRadius, radialSegments, true);

            const material = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    mouse: { value: new THREE.Vector2(0.5, 0.5) }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float time;
                    uniform vec2 mouse;
                    varying vec2 vUv;

                    float heartShape(vec2 st, float size, float pulse) {
                        st = st * 2.0 - 1.0;
                        st.y -= size * 0.12;
                        float r = length(st) * 0.75;
                        float a = atan(st.x, st.y) / 3.14159265;
                        float d = 1.0 - (abs(a) * size * 0.25 + size * 0.35);
                        d += pulse * 0.12;
                        return 1.0 - smoothstep(d, d + 0.04, r);
                    }

                    void main() {
                        // Controla cuántos corazones se ven a lo largo y ancho del tubo
                        vec2 st = fract(vUv * vec2(120.0, 10.0) + vec2(time * 0.15, 0.0));
                        
                        // Latido suave
                        float pulse = sin(time * 4.0) * 0.5 + 0.5;

                        // Interacción del toque/mouse
                        float dMouse = length(vUv - mouse);
                        float mouseInfluence = smoothstep(0.4, 0.0, dMouse);
                        
                        float heart = heartShape(st, 1.1, pulse);
                        
                        // Color neón principal (Rosa/Rojo mágico)
                        vec3 color = vec3(1.0, 0.15, 0.35) * (0.85 + 0.15 * pulse);
                        
                        // Toque destellante al pasar el dedo o mouse
                        color += vec3(0.4, 0.2, 1.0) * mouseInfluence;

                        gl_FragColor = vec4(color * heart, heart * 0.95);
                    }
                `,
                transparent: true,
                side: THREE.BackSide,
            });

            tube = new THREE.Mesh(geometry, material);
            scene.add(tube);

            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('mousemove', onMouseMove, false);
            window.addEventListener('touchmove', onTouchMove, false);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Incremento de tiempo e interpolación fija para la cámara
            t += velocidadViaje; 

            // Posicionar la cámara dentro del camino del tubo de forma segura
            const posActual = tube.geometry.parameters.path.getPointAt(t % 1);
            const posSiguiente = tube.geometry.parameters.path.getPointAt((t + 0.005) % 1);
            
            camera.position.set(posActual.x, posActual.y, posActual.z);
            camera.lookAt(posSiguiente);

            // Pasar el tiempo de renderizado de forma fluida a los corazones
            tube.material.uniforms.time.value += 0.015;

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(event) {
            tube.material.uniforms.mouse.value.x = event.clientX / window.innerWidth;
            tube.material.uniforms.mouse.value.y = 1.0 - (event.clientY / window.innerHeight);
        }

        function onTouchMove(event) {
            if (event.touches.length > 0) {
                tube.material.uniforms.mouse.value.x = event.touches[0].clientX / window.innerWidth;
                tube.material.uniforms.mouse.value.y = 1.0 - (event.touches[0].clientY / window.innerHeight);
            }
        }

        init();
        animate();
    </script>
</body>
</html>
