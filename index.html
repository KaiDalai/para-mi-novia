<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Amor</title>
    <style>
        /* Fondo y estilo general */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffe6e6, #ffb3b3);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        /* Contenedor del mensaje */
        .contenedor {
            z-index: 10;
            background: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 80%;
        }

        h1 {
            color: #d63031;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            color: #4d4d4d;
            font-size: 1.5rem;
            margin: 0;
        }

        /* Animación del corazón latiendo */
        .corazon-principal {
            color: #e84393;
            font-size: 5rem;
            margin-top: 20px;
            animation: latido 0.6s infinite alternate;
        }

        @keyframes latido {
            0% { transform: scale(1); }
            100% { transform: scale(1.2); }
        }

        /* Estilo para los corazones flotantes de fondo */
        .corazon-flotante {
            position: absolute;
            color: rgba(232, 67, 147, 0.6);
            pointer-events: none;
            animation: flotar 4s linear infinite;
        }

        @keyframes flotar {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1 id="nombre">¡Hola, [Su Nombre]!</h1>
        <p>Quiero que sepas que te amo muchísimo ❤️</p>
        <div class="corazon-principal">❤️</div>
    </div>

    <script>
        // JavaScript para crear corazones latiendo y flotando por la pantalla
        function crearCorazon() {
            const corazon = document.createElement('div');
            corazon.classList.add('corazon-flotante');
            
            // Icono del corazón
            corazon.innerText = '❤️';
            
            // Posición horizontal aleatoria
            corazon.style.left = Math.random() * 100 + 'vw';
            
            // Tamaño aleatorio para variedad
            const tamaño = Math.random() * 20 + 10;
            corazon.style.fontSize = tamaño + 'px';
            
            // Duración de la animación aleatoria
            const duracion = Math.random() * 3 + 2;
            corazon.style.animationDuration = duracion + 's';
            
            document.body.appendChild(corazon);
            
            // Eliminar el corazón después de que termine la animación
            setTimeout(() => {
                corazon.remove();
            }, duracion * 1000);
        }

        // Generar un corazón cada 300 milisegundos
        setInterval(crearCorazon, 300);
    </script>

</body>
</html>
