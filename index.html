<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Para Mi Eterno Amor</title>
    <style>
        /* Fondo degradado romántico */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: auto;
        }

        /* Tarjeta de mensaje central */
        #ui {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none; /* Permite tocar a través de la tarjeta para interactuar con el fondo */
            background: rgba(255, 255, 255, 0.75);
            padding: 40px;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            max-width: 450px;
            width: 80%;
            box-shadow: 0 15px 35px rgba(233, 30, 99, 0.2);
        }

        h1 {
            font-size: 2.8rem;
            color: #d81b60;
            margin: 0 0 15px 0;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        p {
            font-size: 1.4rem;
            line-height: 1.6;
            color: #4a148c;
            margin: 10px 0;
        }

        .firma {
            margin-top: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #bc00dd;
            letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.1rem; }
            p { font-size: 1.1rem; }
            #ui { padding: 25px; width: 85%; }
        }
    </style>
</head>
<body>

    <canvas id="canvasCorazones"></canvas>

    <div id="ui">
        <h1>Dayana Gabriela</h1>
        <p>Mi amor por ti es un viaje infinito,<br>
           y cada latido de mi corazón te pertenece.</p>
        <p>Te amo con toda mi alma.</p>
        <div class="firma">[K]</div>
    </div>

    <script>
        const canvas = document.getElementById('canvasCorazones');
        const ctx = canvas.getContext('2d');

        let corazonesBase = [];
        let particulasToque = [];

        // Ajustar el tamaño del lienzo
        function ajustarCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', ajustarCanvas);
        ajustarCanvas();

        // Función matemática para dibujar un corazón en 2D de forma nativa
        function dibujarCorazon(x, y, tamaño, color, opacidad) {
            ctx.save();
            ctx.globalAlpha = opacidad;
            ctx.beginPath();
            ctx.translate(x, y);
            ctx.moveTo(0, 0);
            
            // Curvas Bezier para formar los dos lóbulos del corazón
            ctx.bezierCurveTo(-tamaño / 2, -tamaño / 2, -tamaño, tamaño / 3, 0, tamaño);
            ctx.bezierCurveTo(tamaño, tamaño / 3, tamaño / 2, -tamaño / 2, 0, 0);
            
            ctx.fillStyle = color;
            ctx.fill();
            ctx.restore();
        }

        // Clase para los corazones principales que flotan y rebotan
        class CorazonFlotante {
            constructor() {
                this.reiniciar(true);
            }

            reiniciar(inicioAleatorio = false) {
                this.tamaño = Math.random() * 20 + 15;
                this.x = Math.random() * canvas.width;
                // Si está iniciando, los distribuye por la pantalla; si está reapareciendo, nacen abajo
                this.y = inicioAleatorio ? Math.random() * canvas.height : canvas.height + this.tamaño;
                this.velocidadX = (Math.random() - 0.5) * 1.5; // Movimiento suave lateral
                this.velocidadY = -(Math.random() * 0.8 + 0.5); // Suben suavemente hacia arriba
                this.opacidad = Math.random() * 0.4 + 0.4;
                // Variaciones de tonos rojos y rosados hermosos
                const tonos = ['#ff1744', '#f50057', '#ff4081', '#e91e63', '#ff80ab'];
                this.color = tonos[Math.floor(Math.random() * tonos.length)];
            }

            actualizar() {
                this.x += this.velocidadX;
                this.y += this.velocidadY;

                // Rebotar sutilmente en los bordes laterales
                if (this.x - this.tamaño < 0 || this.x + this.tamaño > canvas.width) {
                    this.velocidadX *= -1;
                }

                // Si salen por completo por la parte superior, reaparecen abajo
                if (this.y < -this.tamaño) {
                    this.reiniciar(false);
                }
            }

            dibujar() {
                dibujarCorazon(this.x, this.y, this.tamaño, this.color, this.opacidad);
            }
        }

        // Clase para los pequeños corazones mágicos que nacen al tocar/mover el mouse
        class ParticulaCorazon {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.tamaño = Math.random() * 8 + 6;
                // Expansión radial tipo explosión suave
                const angulo = Math.random() * Math.PI * 2;
                const fuerza = Math.random() * 3 + 1;
                this.velocidadX = Math.cos(angulo) * fuerza;
                this.velocidadY = Math.sin(angulo) * fuerza;
                this.opacidad = 1;
                this.vida = 1.0; 
                this.desgaste = Math.random() * 0.02 + 0.015; // Ritmo al que desaparecen
                this.color = '#ffffff'; // Corazones brillantes blancos/rosados muy claros
            }

            actualizar() {
                this.x += this.velocidadX;
                this.y += this.velocidadY;
                this.opacidad -= this.desgaste;
                if (this.opacidad < 0) this.opacidad = 0;
            }

            dibujar() {
                dibujarCorazon(this.x, this.y, this.tamaño, this.color, this.opacidad);
            }
        }

        // Inicializar la cantidad de corazones flotantes de fondo
        const cantidadCorazones = 35;
        for (let i = 0; i < cantidadCorazones; i++) {
            corazonesBase.push(new CorazonFlotante());
        }

        // Eventos para interactuar con el tacto y mouse
        function crearEfectoToque(clienteX, clienteY) {
            // Añade múltiples mini corazones en la coordenada tocada
            for (let i = 0; i < 4; i++) {
                particulasToque.push(new ParticulaCorazon(clienteX, clienteY));
            }
        }

        window.addEventListener('mousemove', (e) => {
            crearEfectoToque(e.clientX, e.clientY);
        });

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                crearEfectoToque(e.touches[0].clientX, e.touches[0].clientY);
            }
        });

        window.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                crearEfectoToque(e.touches[0].clientX, e.touches[0].clientY);
            }
        });

        // Bucle principal de animación nativo (corre suave en cualquier dispositivo)
        function animar() {
            // Limpiar lienzo manteniendo el fondo degradado del CSS
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Manejar corazones de fondo
            corazonesBase.forEach(corazon => {
                corazon.actualizar();
                corazon.dibujar();
            });

            // 2. Manejar partículas interactivas
            for (let i = particulasToque.length - 1; i >= 0; i--) {
                const p = particulasToque[i];
                p.actualizar();
                p.dibujar();
                
                // Eliminar del arreglo si ya se desvaneció por completo
                if (p.opacidad <= 0) {
                    particulasToque.splice(i, 1);
                }
            }

            requestAnimationFrame(animar);
        }

        // Iniciar la animación
        animar();
    </script>
</body>
</html>
